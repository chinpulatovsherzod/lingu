services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: production_secure_db_password_change_me
      POSTGRES_DB: lingoarc
    volumes:
      - lingoarc_prod_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lingoarc"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:production_secure_db_password_change_me@postgres:5432/lingoarc?schema=public
      NEXTAUTH_SECRET: production_very_secure_nextauth_secret_token_change_me
      NEXTAUTH_URL: http://localhost:3000
      USE_PGLITE: "false" # In production docker environment, we use PostgreSQL
      GEMINI_API_KEY: "your_gemini_api_key_here"

    depends_on:
      postgres:
        condition: service_healthy

volumes:
  lingoarc_prod_pg:
