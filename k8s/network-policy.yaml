apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: lingoarc-db-policy
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: postgres # Selects the database pod
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: lingoarc-web # Only allow traffic from LingoArc web pod
      ports:
        - protocol: TCP
          port: 5432 # PostgreSQL port
